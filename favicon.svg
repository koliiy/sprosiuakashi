<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Глубокий космический фон -->
    <radialGradient id="bgGrad" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#1e1035"/>
      <stop offset="60%" stop-color="#0d0820"/>
      <stop offset="100%" stop-color="#050310"/>
    </radialGradient>

    <!-- Золотое свечение центра -->
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffe066" stop-opacity="1"/>
      <stop offset="40%" stop-color="#c8a96e" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#8b6a1e" stop-opacity="0"/>
    </radialGradient>

    <!-- Фиолетовое свечение ауры -->
    <radialGradient id="auraGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#9b59f5" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#4a1fa8" stop-opacity="0"/>
    </radialGradient>

    <!-- Золотой металлик для лучей -->
    <linearGradient id="rayGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffe599"/>
      <stop offset="50%" stop-color="#c8a96e"/>
      <stop offset="100%" stop-color="#8b5e1e"/>
    </linearGradient>

    <!-- Свечение вокруг иконки -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ── Фон ── -->
  <circle cx="50" cy="50" r="50" fill="url(#bgGrad)"/>

  <!-- ── Аура фиолетовая ── -->
  <circle cx="50" cy="50" r="38" fill="url(#auraGlow)" opacity="0.7"/>

  <!-- ── Внешнее кольцо с рунами-точками ── -->
  <circle cx="50" cy="50" r="46" fill="none" stroke="#c8a96e" stroke-width="0.6" stroke-opacity="0.5"/>

  <!-- 12 точек по внешнему кольцу (как часы) -->
  <g fill="#c8a96e" opacity="0.7">
    <circle cx="50"   cy="4.5"  r="1.1"/>
    <circle cx="72.5" cy="11"   r="0.8"/>
    <circle cx="88.5" cy="28"   r="1.1"/>
    <circle cx="95.5" cy="50"   r="0.8"/>
    <circle cx="88.5" cy="72"   r="1.1"/>
    <circle cx="72.5" cy="89"   r="0.8"/>
    <circle cx="50"   cy="95.5" r="1.1"/>
    <circle cx="27.5" cy="89"   r="0.8"/>
    <circle cx="11.5" cy="72"   r="1.1"/>
    <circle cx="4.5"  cy="50"   r="0.8"/>
    <circle cx="11.5" cy="28"   r="1.1"/>
    <circle cx="27.5" cy="11"   r="0.8"/>
  </g>

  <!-- ── Второе внутреннее кольцо ── -->
  <circle cx="50" cy="50" r="36" fill="none" stroke="#9b59f5" stroke-width="0.4" stroke-opacity="0.4" stroke-dasharray="3 4"/>

  <!-- ── Треугольник вверх (огонь / восхождение) ── -->
  <polygon points="50,16 67,44 33,44"
    fill="none" stroke="url(#rayGold)" stroke-width="0.9" stroke-opacity="0.65"
    filter="url(#softGlow)"/>

  <!-- ── Треугольник вниз (вода / корни) ── -->
  <polygon points="50,84 33,56 67,56"
    fill="none" stroke="#9b59f5" stroke-width="0.9" stroke-opacity="0.65"
    filter="url(#softGlow)"/>

  <!-- ── Шестиконечная звезда Давида / Печать Соломона — пересечение ── -->
  <!-- Центральный шестиугольник от пересечения — тонкая заливка -->
  <polygon points="50,30 60.4,36 60.4,50 50,56 39.6,50 39.6,36"
    fill="#c8a96e" fill-opacity="0.07" stroke="none"/>

  <!-- ── 6-лучевая звезда — главные лучи ── -->
  <!-- Верхний -->
  <line x1="50" y1="14" x2="50" y2="36" stroke="url(#rayGold)" stroke-width="1.4" stroke-linecap="round" filter="url(#glow)"/>
  <!-- Нижний -->
  <line x1="50" y1="64" x2="50" y2="86" stroke="url(#rayGold)" stroke-width="1.4" stroke-linecap="round" filter="url(#glow)"/>
  <!-- Верхний правый -->
  <line x1="63.1" y1="21.5" x2="56.5" y2="33.5" stroke="url(#rayGold)" stroke-width="1.1" stroke-linecap="round" filter="url(#softGlow)"/>
  <!-- Нижний левый -->
  <line x1="36.9" y1="78.5" x2="43.5" y2="66.5" stroke="url(#rayGold)" stroke-width="1.1" stroke-linecap="round" filter="url(#softGlow)"/>
  <!-- Верхний левый -->
  <line x1="36.9" y1="21.5" x2="43.5" y2="33.5" stroke="url(#rayGold)" stroke-width="1.1" stroke-linecap="round" filter="url(#softGlow)"/>
  <!-- Нижний правый -->
  <line x1="63.1" y1="78.5" x2="56.5" y2="66.5" stroke="url(#rayGold)" stroke-width="1.1" stroke-linecap="round" filter="url(#softGlow)"/>

  <!-- ── Ромбовидные наконечники лучей ── -->
  <g fill="#ffe066" filter="url(#glow)">
    <polygon points="50,10 51.6,15.5 50,18 48.4,15.5" opacity="0.95"/>
    <polygon points="50,90 51.6,84.5 50,82 48.4,84.5" opacity="0.95"/>
    <polygon points="67,19 63,23.5 60.5,22.5 64,18" opacity="0.8"/>
    <polygon points="33,81 37,76.5 39.5,77.5 36,82" opacity="0.8"/>
    <polygon points="33,19 37,23.5 39.5,22.5 36,18" opacity="0.8"/>
    <polygon points="67,81 63,76.5 60.5,77.5 64,82" opacity="0.8"/>
  </g>

  <!-- ── Центральное свечение ── -->
  <circle cx="50" cy="50" r="14" fill="url(#coreGlow)" opacity="0.4"/>

  <!-- ── Центральная 8-лучевая звезда (малая) ── -->
  <g transform="translate(50,50)" filter="url(#glow)">
    <!-- 4 главных луча -->
    <polygon points="0,-9 1.5,-1.5 0,9 -1.5,-1.5" fill="#ffe066" opacity="0.95"/>
    <polygon points="-9,0 -1.5,1.5 9,0 -1.5,-1.5" fill="#ffe066" opacity="0.95"/>
    <!-- 4 диагональных -->
    <polygon points="-6.4,-6.4 -0.9,0.9 6.4,6.4 0.9,-0.9" fill="#c8a96e" opacity="0.75"/>
    <polygon points="6.4,-6.4 0.9,0.9 -6.4,6.4 -0.9,-0.9" fill="#c8a96e" opacity="0.75"/>
  </g>

  <!-- ── Центральная точка ── -->
  <circle cx="50" cy="50" r="2.2" fill="#0d0820"/>
  <circle cx="50" cy="50" r="1.2" fill="#ffe599"/>

  <!-- ── Малые звёзды-акценты в углах ── -->
  <g fill="#c8a96e" opacity="0.5">
    <polygon points="18,18 19,16 20,18 18,17" transform="rotate(15,19,17)"/>
    <polygon points="80,20 81,18 82,20 80,19" transform="rotate(-10,81,19)"/>
    <polygon points="16,80 17,78 18,80 16,79" transform="rotate(5,17,79)"/>
    <polygon points="82,78 83,76 84,78 82,77" transform="rotate(-20,83,77)"/>
  </g>
</svg>
