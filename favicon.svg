<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1428"/>
      <stop offset="100%" stop-color="#0b0912"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#c8a96e" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#c8a96e" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Фон круг -->
  <circle cx="50" cy="50" r="50" fill="url(#bg)"/>
  <circle cx="50" cy="50" r="50" fill="url(#glow)"/>

  <!-- Внешнее кольцо -->
  <circle cx="50" cy="50" r="46" fill="none" stroke="#c8a96e" stroke-width="0.8" stroke-opacity="0.5"/>

  <!-- Звезда Акаши (8-лучевая) -->
  <g transform="translate(50,50)" fill="#c8a96e">
    <!-- Вертикальный ромб -->
    <polygon points="0,-22 3,-3 0,22 -3,-3" opacity="0.9"/>
    <!-- Горизонтальный ромб -->
    <polygon points="-22,0 -3,3 22,0 -3,-3" opacity="0.9"/>
    <!-- Диагональ 1 -->
    <polygon points="-15.5,-15.5 -2,2 15.5,15.5 2,-2" opacity="0.7"/>
    <!-- Диагональ 2 -->
    <polygon points="15.5,-15.5 2,2 -15.5,15.5 -2,-2" opacity="0.7"/>
  </g>

  <!-- Центральная точка -->
  <circle cx="50" cy="50" r="3.5" fill="#0b0912"/>
  <circle cx="50" cy="50" r="2" fill="#c8a96e"/>

  <!-- Малые звёзды-акценты -->
  <circle cx="50" cy="18" r="1.2" fill="#c8a96e" opacity="0.6"/>
  <circle cx="82" cy="50" r="1.2" fill="#c8a96e" opacity="0.6"/>
  <circle cx="50" cy="82" r="1.2" fill="#c8a96e" opacity="0.6"/>
  <circle cx="18" cy="50" r="1.2" fill="#c8a96e" opacity="0.6"/>
</svg>
